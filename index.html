<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Memory Card Game</title>
  <style>
    /* basic page styling */
    body {
      background-color: #1a1a2e;
      font-family: Arial, sans-serif;
      color: white;
      text-align: center;
      padding: 20px;
    }

    h1 {
      color: #f7c948;
      font-size: 36px;
      margin-bottom: 5px;
    }

    p {
      color: #aaaaaa;
      margin-bottom: 20px;
    }

    /* stats at the top */
    .stats {
      display: flex;
      justify-content: center;
      gap: 30px;
      margin-bottom: 20px;
    }

    .stat {
      background-color: #16213e;
      padding: 10px 20px;
      border-radius: 10px;
      border: 2px solid #333366;
    }

    .stat h3 {
      font-size: 12px;
      color: #aaaaaa;
      margin-bottom: 5px;
    }

    .stat p {
      font-size: 28px;
      font-weight: bold;
      color: #f7c948;
      margin: 0;
    }

    /* the card grid */
    .grid {
      display: grid;
      grid-template-columns: repeat(4, 90px);
      gap: 10px;
      justify-content: center;
      margin-bottom: 20px;
    }

    /* each card */
    .card {
      width: 90px;
      height: 90px;
      background-color: #16213e;
      border: 2px solid #333366;
      border-radius: 10px;
      font-size: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    /* card when it is flipped */
    .card.flipped {
      background-color: #252545;
      border-color: #6666aa;
    }

    /* card when it is matched */
    .card.matched {
      background-color: #1a3a2a;
      border-color: #6bffb8;
    }

    /* card when it doesnt match - goes red */
    .card.wrong {
      background-color: #3a1a1a;
      border-color: #ff6b6b;
    }

    /* the restart button */
    button {
      background-color: #f7c948;
      color: black;
      font-size: 16px;
      font-weight: bold;
      padding: 12px 30px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 10px;
    }

    button:hover {
      background-color: #e0b030;
    }
  </style>
</head>
<body>

  <h1>Memory Card Game</h1>
  <p>Made by Martin Lister</p>

  <!-- stats bar -->
  <div class="stats">
    <div class="stat">
      <h3>MOVES</h3>
      <p id="moves">0</p>
    </div>
    <div class="stat">
      <h3>PAIRS</h3>
      <p id="pairs">0</p>
    </div>
    <div class="stat">
      <h3>TIME</h3>
      <p id="timer">0s</p>
    </div>
  </div>

  <!-- the card grid -->
  <div class="grid" id="grid"></div>

  <button onclick="startGame()">New Game</button>

  <script>

    // all the emojis i am using for the cards
    var emojis = ['🐶','🐱','🐭','🐹','🐰','🦊','🐻','🐼'];

    // variables to keep track of the game
    var flippedCards = [];
    var matchedPairs = 0;
    var moves = 0;
    var canFlip = true;
    var seconds = 0;
    var timerInterval = null;
    var gameStarted = false;

    // this shuffles the cards so they are in a random order
    function shuffle(array) {
      for (var i = array.length - 1; i > 0; i--) {
        var j = Math.floor(Math.random() * (i + 1));
        var temp = array[i];
        array[i] = array[j];
        array[j] = temp;
      }
      return array;
    }

    // this starts a new game and resets everything
    function startGame() {
      // reset all the variables
      clearInterval(timerInterval);
      seconds = 0;
      moves = 0;
      matchedPairs = 0;
      flippedCards = [];
      canFlip = true;
      gameStarted = false;

      // reset the stats on the page
      document.getElementById('moves').textContent = '0';
      document.getElementById('pairs').textContent = '0';
      document.getElementById('timer').textContent = '0s';

      // make pairs of emojis and shuffle them
      var cards = shuffle([...emojis, ...emojis]);

      // clear the grid and build the cards
      var grid = document.getElementById('grid');
      grid.innerHTML = '';

      for (var i = 0; i < cards.length; i++) {
        var card = document.createElement('div');
        card.className = 'card';
        card.dataset.emoji = cards[i];
        card.textContent = '?';
        card.addEventListener('click', handleClick);
        grid.appendChild(card);
      }
    }

    // starts the timer when the first card is clicked
    function startTimer() {
      timerInterval = setInterval(function() {
        seconds++;
        document.getElementById('timer').textContent = seconds + 's';
      }, 1000);
    }

    // this runs when a card is clicked
    function handleClick() {
      // dont do anything if we already have 2 cards flipped
      if (!canFlip) return;

      // dont flip a card that is already flipped or matched
      if (this.classList.contains('flipped')) return;
      if (this.classList.contains('matched')) return;

      // start the timer on the first click
      if (!gameStarted) {
        gameStarted = true;
        startTimer();
      }

      // show the emoji on the card
      this.textContent = this.dataset.emoji;
      this.classList.add('flipped');
      flippedCards.push(this);

      // if 2 cards are flipped check if they match
      if (flippedCards.length === 2) {
        moves++;
        document.getElementById('moves').textContent = moves;
        checkIfMatch();
      }
    }

    // checks if the 2 flipped cards are the same
    function checkIfMatch() {
      var card1 = flippedCards[0];
      var card2 = flippedCards[1];

      if (card1.dataset.emoji === card2.dataset.emoji) {
        // they match so keep them flipped
        card1.classList.add('matched');
        card2.classList.add('matched');
        flippedCards = [];
        matchedPairs++;
        document.getElementById('pairs').textContent = matchedPairs;

        // check if the game is over
        if (matchedPairs === emojis.length) {
          clearInterval(timerInterval);
          setTimeout(function() {
            alert('Well done! You finished in ' + seconds + ' seconds with ' + moves + ' moves!');
          }, 400);
        }

      } else {
        // they dont match so flip them back over
        canFlip = false;
        card1.classList.add('wrong');
        card2.classList.add('wrong');

        setTimeout(function() {
          card1.textContent = '?';
          card2.textContent = '?';
          card1.classList.remove('flipped', 'wrong');
          card2.classList.remove('flipped', 'wrong');
          flippedCards = [];
          canFlip = true;
        }, 900);
      }
    }

    // start the game when the page loads
    startGame();

  </script>

</body>
</html>
