<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Memory Card Game</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <header>
    <h1>Memory Card Game</h1>
    <p>Made by Martin Lister</p>
  </header>

  <main>

    <section class="difficulty">
      <button class="active" onclick="setDifficulty('easy', this)">Easy</button>
      <button onclick="setDifficulty('hard', this)">Hard</button>
    </section>

    <section class="stats">
      <div class="stat">
        <h3>MOVES</h3>
        <p id="moves">0</p>
      </div>
      <div class="stat">
        <h3>PAIRS</h3>
        <p id="pairs">0</p>
      </div>
      <div class="stat">
        <h3>TIME</h3>
        <p id="timer">0s</p>
      </div>
      <div class="stat best">
        <h3>BEST</h3>
        <p id="best">-</p>
      </div>
    </section>

    <section class="grid easy" id="grid"></section>

    <section>
      <button class="new-game-btn" onclick="startGame()">New Game</button>
    </section>

  </main>

  <footer>
    <p>Built with HTML, CSS and JavaScript</p>
  </footer>

  <script src="script.js"></script>

</body>
</html>
