<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Memory Card Game</title>
  <style>

    body {
      background-color: #1a1a2e;
      font-family: Arial, sans-serif;
      color: white;
      text-align: center;
      padding: 20px;
    }

    header h1 {
      color: #f7c948;
      font-size: 36px;
    }

    header p {
      color: #aaaaaa;
      margin-bottom: 0px;
    }

    /* stats */
    .stats {
      display: flex;
      justify-content: center;
      gap: 30px;
      margin-bottom: 20px;
      margin-top: 15px;
    }

    .stat {
      background-color: #16213e;
      padding: 10px 20px;
      border-radius: 10px;
      border: 2px solid #333366;
    }

    .stat h3 {
      font-size: 12px;
      color: #aaaaaa;
      margin-bottom: 5px;
      margin-top: 0px;
    }

    .stat p {
      font-size: 28px;
      font-weight: bold;
      color: #f7c948;
      margin: 0;
    }

    /* card grid */
    .grid {
      display: grid;
      grid-template-columns: repeat(4, 90px);
      gap: 10px;
      justify-content: center;
      margin-bottom: 20px;
    }

    .card {
      width: 90px;
      height: 90px;
      background-color: #16213e;
      border: 2px solid #333366;
      border-radius: 10px;
      font-size: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    .card.flipped {
      background-color: #252545;
      border-color: #6666aa;
    }

    .card.matched {
      background-color: #1a3a2a;
      border-color: #6bffb8;
    }

    .card.wrong {
      background-color: #3a1a1a;
      border-color: #ff6b6b;
    }

    button {
      background-color: #f7c948;
      color: black;
      font-size: 16px;
      font-weight: bold;
      padding: 12px 30px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 10px;
    }

    button:hover {
      background-color: #e0b030;
    }

  </style>
</head>
<body>

  <header>
    <h1>Memory Card Game</h1>
    <p>Made by Martin Lister</p>
  </header>

  <main>

    <section class="stats">
      <div class="stat">
        <h3>MOVES</h3>
        <p id="moves">0</p>
      </div>
      <div class="stat">
        <h3>PAIRS</h3>
        <p id="pairs">0</p>
      </div>
      <div class="stat">
        <h3>TIME</h3>
        <p id="timer">0s</p>
      </div>
    </section>

    <section class="grid" id="grid"></section>

    <section>
      <button onclick="startGame()">New Game</button>
    </section>

  </main>

  <footer>
    <p>Built with HTML, CSS and JavaScript</p>
  </footer>

  <script>

    var emojis = ['🐶','🐱','🐭','🐹','🐰','🦊','🐻','🐼'];

    var firstCard = null;
    var secondCard = null;
    var matchedPairs = 0;
    var moves = 0;
    var canFlip = true;
    var seconds = 0;
    var timerInterval = null;
    var gameStarted = false;

    function startGame() {

      clearInterval(timerInterval);
      seconds = 0;
      moves = 0;
      matchedPairs = 0;
      firstCard = null;
      secondCard = null;
      canFlip = true;
      gameStarted = false;

      document.getElementById('moves').textContent = '0';
      document.getElementById('pairs').textContent = '0';
      document.getElementById('timer').textContent = '0s';

      // duplicate the emojis so we have pairs then shuffle them
      // found this shuffle method on stackoverflow
      var cards = [...emojis, ...emojis].sort(() => Math.random() - 0.5);

      var grid = document.getElementById('grid');
      grid.innerHTML = '';

      for (var i = 0; i < cards.length; i++) {
        var card = document.createElement('div');
        card.className = 'card';
        card.dataset.emoji = cards[i];
        card.textContent = '?';
        card.addEventListener('click', handleClick);
        grid.appendChild(card);
      }
    }

    function startTimer() {
      timerInterval = setInterval(function() {
        seconds++;
        document.getElementById('timer').textContent = seconds + 's';
      }, 1000);
    }

    function handleClick() {

      if (!canFlip) return;
      if (this.classList.contains('flipped')) return;
      if (this.classList.contains('matched')) return;

      if (gameStarted == false) {
        gameStarted = true;
        startTimer();
      }

      this.textContent = this.dataset.emoji;
      this.classList.add('flipped');

      // save the first card then wait for second click
      if (firstCard == null) {
        firstCard = this;
        return;
      }

      // second card clicked
      secondCard = this;
      moves++;
      document.getElementById('moves').textContent = moves;

      // check if they are the same
      if (firstCard.dataset.emoji == secondCard.dataset.emoji) {

        firstCard.classList.add('matched');
        secondCard.classList.add('matched');

        firstCard = null;
        secondCard = null;

        matchedPairs++;
        document.getElementById('pairs').textContent = matchedPairs;

        if (matchedPairs == emojis.length) {
          clearInterval(timerInterval);
          setTimeout(function() {
            alert('You win!! Finished in ' + seconds + ' seconds and ' + moves + ' moves');
          }, 400);
        }

      } else {

        // not a match so flip them back
        canFlip = false;

        firstCard.classList.add('wrong');
        secondCard.classList.add('wrong');

        // need to save these because firstCard gets reset in the timeout
        var card1 = firstCard;
        var card2 = secondCard;

        firstCard = null;
        secondCard = null;

        setTimeout(function() {
          card1.textContent = '?';
          card2.textContent = '?';
          card1.classList.remove('flipped', 'wrong');
          card2.classList.remove('flipped', 'wrong');
          canFlip = true;
        }, 900);

      }
    }

    startGame();

  </script>

</body>
</html>
