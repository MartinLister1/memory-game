<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Memory Card Game</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <header>
    <h1>Memory Card Game</h1>
    <p>Made by Martin Lister</p>
  </header>

  <main>

    <section class="difficulty">
      <button class="active" onclick="setDifficulty('easy', this)">Easy</button>
      <button onclick="setDifficulty('hard', this)">Hard</button>
    </section>

    <section class="stats">
      <article class="stat">
        <small>MOVES</small>
        <strong id="moves">0</strong>
      </article>
      <article class="stat">
        <small>PAIRS</small>
        <strong id="pairs">0</strong>
      </article>
      <article class="stat">
        <small>TIME</small>
        <strong id="timer">0s</strong>
      </article>
      <article class="stat best">
        <small>BEST MOVES</small>
        <strong id="best">-</strong>
      </article>
    </section>

    <section class="grid easy" id="grid"></section>

    <section>
      <button class="new-game-btn" onclick="startGame()">New Game</button>
    </section>

  </main>

  <footer>
    <p>Built with HTML, CSS and JavaScript</p>
  </footer>

  <script src="script.js"></script>

</body>
</html>
